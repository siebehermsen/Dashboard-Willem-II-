{% extends 'base.html' %}
{% block content %}

<style>
    .page-title {
    color: #0c2340;
    font-size: 40px;
    font-weight: 900;
    text-align: center;
    margin-bottom: 25px;
}

/* DATE SWITCHER */
.date-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 25px;
}

.nav-btn {
    background: #0c2340;      /* dashboard blauw */
    color: #ffffff;
    padding: 10px 25px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    transition: .25s;
    font-size: 16px;
}

.nav-btn:hover {
    background: #081a30;      /* iets donkerder bij hover */
    transform: translateY(-2px);
}

.date-display {
    background: #ffffff;
    border: 2px solid #0c2340; /* dashboard blauw */
    padding: 8px 20px;
    font-size: 22px;
    font-weight: 700;
    border-radius: 10px;
    color: #0c2340;
}

    /* TABLE */
    .table-wrapper {
        margin-top: 10px;
        background: #ffffff;
        padding: 25px;
        border-radius: 16px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.07);
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 15px;
        min-width: 900px;
    }

    th {
        background: #0c2340;
        color: white;
        padding: 12px;
        position: sticky;
        top: 0;
        z-index: 10;
        text-align: left;
        font-weight: 800;
    }

    td {
        padding: 10px;
        border-bottom: 1px solid #e3e6eb;
    }

    /* INPUTS */
    .status-box {
        background: #ffe7c2;
        padding: 5px;
        border-radius: 10px;
        border: 2px solid #ffbb6a;
    }

    select, input[type="checkbox"] {
        padding: 7px;
        border-radius: 8px;
        border: 1px solid #c7c7c7;
        background: white;
        width: 100%;
    }

    .save-btn {
    background: #0c2340;      /* dashboard donkerblauw */
    color: #ffffff;           /* wit */
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: .25s;
    width: 100%;
}

.save-btn:hover {
    background: #081a30;      /* iets donkerder voor hover */
}


    /* COLORS */
    .row-green { background: #e8ffec !important; }
    .row-orange { background: #fff3e0 !important; }
</style>

<h1 class="page-title">AANWEZIGHEDEN</h1>

<div class="date-nav">
    <a href="?date={{ previous_day|date:'Y-m-d' }}" class="nav-btn">← Vorige dag</a>

    <span class="date-display">{{ chosen_date|date:"Y-m-d" }}</span>

    <a href="?date={{ next_day|date:'Y-m-d' }}" class="nav-btn">Volgende dag →</a>
</div>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>Speler</th>
                <th>Aanwezigheid</th>
                <th>Opslaan</th>
                <th>✔</th>
            </tr>
        </thead>

        <tbody>
        {% for record in records %}
            <tr
                {% if record.completed %}
                    class="row-green"
                {% elif record.status != 'overig' %}
                    class="row-orange"
                {% endif %}
            >
                <td>{{ record.player.name }}</td>

                <form method="POST" action="{% url 'aanwezigheden_update' record.id %}">
                {% csrf_token %}
                    <td>
                        <div class="status-box">
                            <select name="status" onchange="this.form.submit()">
                                {% for value, label in status_choices %}
                                    <option value="{{ value }}" {% if record.status == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </td>

                    <td>
                        <button type="submit" class="save-btn">💾</button>
                    </td>

                    <td style="text-align:center;">
                        <input type="checkbox" name="completed" {% if record.completed %}checked{% endif %} onchange="this.form.submit()">
                    </td>
                </form>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
