<!DOCTYPE html>
<html lang="nl">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - NEC Dashboard</title>
    <link rel="manifest" href="{% static 'manifest.json' %}?v=7">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'icons/apple-touch-icon.png' %}?v=5">
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'icons/icon-192.png' %}?v=5">
    <link rel="canonical" href="{{ request.build_absolute_uri }}">
    <meta name="theme-color" content="#07100c">
    <meta name="description" content="Log in op het NEC Dashboard voor performance, monitoring, planning en teamoverzicht.">
    <meta property="og:site_name" content="NEC Dashboard">
    <meta property="og:title" content="NEC Dashboard">
    <meta property="og:description" content="Online dashboard voor performance, monitoring, planning en teamoverzicht binnen NEC.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'icons/icon-512.png' %}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="NEC Dashboard">
    <meta name="twitter:description" content="Online dashboard voor performance, monitoring, planning en teamoverzicht binnen NEC.">
    <meta name="application-name" content="NEC Dashboard">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="NEC">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
            --nec-black: #050506;
            --nec-charcoal: #111816;
            --nec-red: #d71920;
            --nec-green: #008f55;
            --text: #152443;
            --muted: #657392;
            --line: #d5def0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Poppins", Arial, sans-serif;
            color: var(--text);
            background: #f2f5fb;
        }

        .layout {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1.2fr 0.9fr;
        }

        .photo-side {
            position: relative;
            background-color: var(--nec-black);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .photo-side::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 18% 12%, rgba(215, 25, 32, 0.30), transparent 32%),
                radial-gradient(circle at 78% 18%, rgba(0, 143, 85, 0.24), transparent 34%),
                linear-gradient(180deg, rgba(5, 5, 6, 0.24) 0%, rgba(5, 5, 6, 0.76) 100%);
            pointer-events: none;
        }

        .photo-side::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(115deg, rgba(215, 25, 32, 0.20) 0%, rgba(0, 143, 85, 0.10) 48%, rgba(5, 5, 6, 0.28) 100%);
            pointer-events: none;
        }

        .club-chip {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(5, 5, 6, 0.58);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            padding: 10px 14px;
            backdrop-filter: blur(8px);
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.22);
        }

        .club-chip img {
            width: 42px;
            height: 42px;
            object-fit: contain;
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.32));
        }

        .club-chip span {
            font-size: 0.78rem;
            letter-spacing: 0.4px;
            font-weight: 700;
            color: #ffffff;
        }


        .login-side {
            display: grid;
            place-items: center;
            padding: 26px;
            background:
                radial-gradient(700px 300px at 100% -20%, rgba(0, 143, 85, 0.12), transparent 60%),
                radial-gradient(700px 300px at 0% 120%, rgba(215, 25, 32, 0.14), transparent 60%),
                #f7f9fd;
        }

        .card {
            width: min(470px, 96%);
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 26px;
            box-shadow: 0 18px 36px rgba(18, 31, 62, 0.14);
        }

        .card-head {
            text-align: center;
            margin-bottom: 16px;
        }

        .logo-round {
            width: 64px;
            height: 64px;
            border-radius: 0;
            border: 0;
            object-fit: contain;
            background: transparent;
            padding: 0;
            filter: drop-shadow(0 10px 16px rgba(0, 0, 0, 0.18));
            display: inline-block;
        }

        .card-head h1 {
            margin: 10px 0 0;
            font-size: 1.8rem;
            color: var(--nec-black);
        }

        .card-head p {
            margin: 6px 0 0;
            color: var(--muted);
        }

        .error {
            margin: 0 0 12px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #efb4bb;
            background: #fff4f5;
            color: #8f1f2d;
            font-size: 0.9rem;
        }

        .field {
            display: grid;
            gap: 6px;
            margin-bottom: 12px;
        }

        .password-wrap {
            position: relative;
        }

        label {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--nec-black);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            height: 46px;
            border: 1px solid #c6d0e4;
            border-radius: 10px;
            padding: 0 44px 0 12px;
            font-size: 0.98rem;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #87a1dd;
            box-shadow: 0 0 0 3px rgba(78, 111, 182, 0.14);
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            color: #5f6e8f;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            padding: 4px;
        }

        .toggle-password:hover {
            color: var(--nec-black);
        }

        .remember {
            margin: 6px 0 14px;
            display: flex;
            align-items: center;
            gap: 9px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .remember input {
            width: 16px;
            height: 16px;
            margin: 0;
            accent-color: var(--nec-red);
        }

        .btn {
            width: 100%;
            height: 46px;
            border: 0;
            border-radius: 11px;
            background: linear-gradient(135deg, var(--nec-red) 0%, #a90f16 52%, var(--nec-black) 100%);
            color: #fff;
            font-size: 1.04rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.2px;
            box-shadow: 0 9px 18px rgba(201, 25, 35, 0.25);
        }

        .accent-line {
            margin: 14px auto 0;
            width: 66px;
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--nec-red), var(--nec-green), var(--nec-black));
            opacity: 0.95;
        }

        @media (max-width: 980px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .photo-side {
                min-height: 300px;
            }

            .login-side {
                padding: 14px 14px 24px;
                margin-top: -24px;
                position: relative;
                z-index: 3;
            }

            .card {
                width: min(520px, 100%);
            }
        }
    </style>
</head>
<body>
    <main class="layout">
        <section class="photo-side" aria-hidden="true">
            <div class="club-chip">
                <img src="{% static 'icons/nec-logo.svg' %}" alt="NEC">
                <span>NEC NIJMEGEN</span>
            </div>
        </section>

        <section class="login-side">
            <div class="card">
                <div class="card-head">
                    <img class="logo-round" src="{% static 'icons/nec-logo.svg' %}" alt="NEC logo">
                    <h1>NEC Dashboard</h1>
                    <p>Log in om toegang te krijgen</p>
                </div>

                {% if form.non_field_errors %}
                    <div class="error">Onjuiste gebruikersnaam of wachtwoord.</div>
                {% elif form.errors %}
                    <div class="error">Vul alle verplichte velden correct in.</div>
                {% endif %}

                <form method="post" action="{% url 'login' %}" autocomplete="off">
                    {% csrf_token %}
                    <div class="field">
                        <label for="id_username">Gebruikersnaam</label>
                        <input id="id_username" name="username" type="text" required autofocus>
                    </div>

                    <div class="field">
                        <label for="id_password">Wachtwoord</label>
                        <div class="password-wrap">
                            <input id="id_password" name="password" type="password" required>
                            <button class="toggle-password" type="button" id="togglePassword" aria-label="Wachtwoord tonen" title="Wachtwoord tonen">👁</button>
                        </div>
                    </div>

                    <label class="remember">
                        <input type="checkbox" name="remember_me">
                        <span>Onthoud mij op dit apparaat</span>
                    </label>

                    <input type="hidden" name="next" value="{{ next|default:'/dashboard/' }}">

                    <button class="btn" type="submit">Inloggen</button>
                    <div class="accent-line"></div>
                </form>
            </div>
        </section>
    </main>
    <script>
        (function () {
            var images = [
                "{% static 'img/login/nec-login-sano.webp' %}",
                "{% static 'img/login/nec-login-nejasmic.jpg' %}",
                "{% static 'img/login/nec-login-sfeer.jpg' %}"
            ];
            var choice = images[Math.floor(Math.random() * images.length)];
            var side = document.querySelector(".photo-side");
            if (side && choice) {
                side.style.backgroundImage = "url('" + choice + "')";
            }
        })();

        (function () {
            var btn = document.getElementById("togglePassword");
            var input = document.getElementById("id_password");
            if (!btn || !input) {
                return;
            }
            btn.addEventListener("click", function () {
                var show = input.type === "password";
                input.type = show ? "text" : "password";
                btn.setAttribute("aria-label", show ? "Wachtwoord verbergen" : "Wachtwoord tonen");
                btn.setAttribute("title", show ? "Wachtwoord verbergen" : "Wachtwoord tonen");
            });
        })();
    </script>
</body>
</html>
